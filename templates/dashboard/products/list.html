{% extends "dashboard/base.html" %}

{% block title %}
Ürünler
{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>
            <h3 class="mb-0">
                {{ title|default:"Ürünler" }}
            </h3>
        </div>

        <div>

            <a href="#"
               class="btn btn-primary">

                <i class="bi bi-plus-lg"></i>

                Yeni Ürün

            </a>

        </div>

    </div>

    <div class="card shadow-sm">

        <div class="card-body">

            <form method="get"
                  class="row g-3 mb-4">

                <div class="col-md-5">

                    <input
                        type="text"
                        name="q"
                        class="form-control"
                        placeholder="Ürün ara..."
                        value="{{ search }}">

                </div>

                <div class="col-auto">

                    <button
                        class="btn btn-primary"
                        type="submit">

                        <i class="bi bi-search"></i>

                        Ara

                    </button>

                </div>

            </form>

            {% include "dashboard/includes/table.html" %}

        </div>

    </div>

</div>

{% endblock %}

{% extends "base.html" %}

{% block title %}Ürünler{% endblock %}

{% block content %}

<div class="container py-5">

<div class="row">

{% for product in products %}

<div class="col-lg-3 col-md-4 mb-4">

<div class="card h-100">

<div class="card-body">

<h5>{{ product.name }}</h5>

<p>{{ product.brand }}</p>

<h4>{{ product.price }} ₺</h4>

<a href="{{ product.get_absolute_url }}" class="btn btn-dark">

İncele

</a>

</div>

</div>

</div>

{% endfor %}

</div>

</div>

{% endblock %}
